<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UK Major Construction Projects Dashboard</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.sheetjs.com/"/script>
</head>

<body>

<header class="hero">
    <div>
        <h1>UK Major Construction Projects Dashboard</h1>
        <p>July 2026 GTM Dataset</p>
    </div>

    <a class="download-button"
       href="UK%20Major%20Construction%20Projects%20GTM%20Workbook%20-%20July%202026.xlsx">
       Download Workbook
    </a>
</header>

<section class="stats-grid">

    <div class="stat-card">
        <span id="projectsCount">0</span>
        <p>Projects</p>
    </div>

    <div class="stat-card">
        <span id="contactsCount">0</span>
        <p>Target Contacts</p>
    </div>

    <div class="stat-card">
        <span id="contractorsCount">0</span>
        <p>Contractor / JV Records</p>
    </div>

</section>

<section class="search-box">

    <input
        type="text"
        id="globalSearch"
        placeholder="Search projects, contacts, owners, contractors..."
    >

</section>

<section class="tabs">

    <button class="tab active" data-tab="projects">
        Project Pipeline
    </button>

    <button class="tab" data-tab="contacts">
        Target Contacts
    </button>

    <button class="tab" data-tab="contractors">
        Contractor JV Map
    </button>

</section>

<section id="projects" class="tab-content active">
    <h2>Project Pipeline</h2>
    <div id="projectsTable"></div>
</section>

<section id="contacts" class="tab-content">
    <h2>Target Contacts</h2>
    <div id="contactsTable"></div>
</section>

<section id="contractors" class="tab-content">
    <h2>Contractor JV Map</h2>
    <div id="contractorsTable"></div>
</section>

<script src="app.js"></script>

</body>
</html>
