<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UK Major Construction Projects Dashboard</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.sheetjs.com/"/script>
<script defer src="app.js"></script>

</head>

<body>

<div class="header">
    <h1>UK Major Construction Projects Dashboard</h1>
    <p>July 2026 GTM Dataset</p>
</div>

<div class="summary">

    <div class="card">
        <h2 id="projectsCount">0</h2>
        <p>Projects</p>
    </div>

    <div class="card">
        <h2 id="contactsCount">0</h2>
        <p>Target Contacts</p>
    </div>

    <div class="card">
        <h2 id="contractorsCount">0</h2>
        <p>Contractor JV Records</p>
    </div>

</div>

<div class="search-panel">

    <input
        id="searchBox"
        type="text"
        placeholder="Search projects, contractors, contacts, owners..."
    >

</div>

<div class="tabs">

    <button class="tab active" onclick="showTab('projects')">
        Project Pipeline
    </button>

    <button class="tab" onclick="showTab('contacts')">
        Target Contacts
    </button>

    <button class="tab" onclick="showTab('contractors')">
        Contractor JV Map
    </button>

</div>

<div id="projects" class="tab-content active">
    <h2>Project Pipeline</h2>
    <div id="projectsTable"></div>
</div>

<div id="contacts" class="tab-content">
    <h2>Target Contacts</h2>
    <div id="contactsTable"></div>
</div>

<div id="contractors" class="tab-content">
    <h2>Contractor JV Map</h2>
    <div id="contractorsTable"></div>
</div>

<div class="download-area">

    UK%20Major%20Construction%20Projects%20GTM%20Workbook%20-%20July%202026.xlsx
        Download Workbook
    </a>

</div>

</body>
</html>
